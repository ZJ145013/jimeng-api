worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # WebDAV 代理（解决 CORS 问题）
        # 前端填写 /webdav/ 作为 WebDAV 地址
        # 修改下面的 proxy_pass 为你的 WebDAV 服务器地址
        location /webdav/ {
            # ===== 修改这里为你的 WebDAV 地址 =====
            proxy_pass https://webdav.942645.xyz/;
            # =====================================

            proxy_set_header Host webdav.942645.xyz;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 传递认证头
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;

            # SSL 后端
            proxy_ssl_server_name on;

            # 大文件支持
            client_max_body_size 100M;
            proxy_request_buffering off;

            # 添加 CORS 头
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, DELETE, PROPFIND, MKCOL, COPY, MOVE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth, Overwrite, Destination' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # 处理 OPTIONS 预检请求
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, PUT, DELETE, PROPFIND, MKCOL, COPY, MOVE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth, Overwrite, Destination';
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }
        }

        # SPA history fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for index.html
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
