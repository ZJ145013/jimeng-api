# docker-compose-web.yml — 前后端联合部署
services:
  jimeng-api:
    image: ghcr.io/zj145013/jimeng-api:latest
    container_name: jimeng-api
    restart: unless-stopped
    ports:
      - "5100:5100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5100/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  jimeng-web:
    image: ghcr.io/zj145013/jimeng-web:latest
    container_name: jimeng-web
    restart: unless-stopped
    ports:
      - "8185:80"
    depends_on:
      jimeng-api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
